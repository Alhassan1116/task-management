<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>Task Manager</h1>
    </div>
  </header>

  <main class="container">
    <!-- Add / Edit form -->
    <section class="card form-card">
      <h2 id="form-title">Add New Task</h2>
      <form id="task-form" novalidate>
        <input type="hidden" id="edit-id" value="" />

        <div class="form-row">
          <div class="form-group">
            <label for="title">Title <span class="required">*</span></label>
            <input type="text" id="title" placeholder="Task title" required maxlength="200" />
          </div>
          <div class="form-group">
            <label for="status">Status</label>
            <select id="status">
              <option value="pending">Pending</option>
              <option value="in-progress">In Progress</option>
              <option value="completed">Completed</option>
            </select>
          </div>
          <div class="form-group">
            <label for="due-date">Due Date</label>
            <input type="date" id="due-date" />
          </div>
        </div>

        <div class="form-group">
          <label for="description">Description</label>
          <textarea id="description" rows="3" placeholder="Optional description…"></textarea>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="submit-btn">Add Task</button>
          <button type="button" class="btn btn-ghost" id="cancel-btn" hidden>Cancel</button>
        </div>
        <p class="form-error" id="form-error" hidden></p>
      </form>
    </section>

    <!-- Filter bar -->
    <section class="filter-bar">
      <span class="filter-label">Filter:</span>
      <button class="filter-btn active" data-status="all">All</button>
      <button class="filter-btn" data-status="pending">Pending</button>
      <button class="filter-btn" data-status="in-progress">In Progress</button>
      <button class="filter-btn" data-status="completed">Completed</button>
      <span class="task-count" id="task-count"></span>
    </section>

    <!-- Task list -->
    <section id="task-list" class="task-list">
      <div class="loading" id="loading">Loading tasks…</div>
    </section>
  </main>

  <!-- Delete confirmation modal -->
  <div class="modal-overlay" id="delete-modal" hidden>
    <div class="modal">
      <h3>Delete Task?</h3>
      <p>This action cannot be undone.</p>
      <div class="modal-actions">
        <button class="btn btn-danger" id="confirm-delete-btn">Delete</button>
        <button class="btn btn-ghost" id="cancel-delete-btn">Cancel</button>
      </div>
    </div>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
